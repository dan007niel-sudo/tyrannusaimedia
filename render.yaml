# Render Blueprint — Tyrannus AI Media
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: tyrannusaimedia
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.11
